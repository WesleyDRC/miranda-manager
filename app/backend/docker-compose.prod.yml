version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: app.dockerfile
    container_name: miranda-manager-app
    env_file:
      - .env
    restart: always
    ports:
      - "127.0.0.1:5001:5000"
#    volumes:
 #     - .:/app
    depends_on:
      - database
    environment:
      DB_HOST: database
    networks:
      - miranda-manager-network

  database:
    image: mongo:4.4
    container_name: miranda-manager-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: miranda_manager_database
    ports:
      - "27017:27017"
    volumes:
      - /home/wesleydrc/server/mongo_data:/data/db
    networks:
      - miranda-manager-network
    deploy:
      resources:
        limits:
          memory: 1G

  mongo-express:
    image: mongo-express:latest
    container_name: miranda-manager-mongo-express
    restart: always
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASIC_AUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASIC_AUTH_PASSWORD}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: database
    ports:
      - "8081:8081"
    networks:
      - miranda-manager-network
    depends_on:
      - database

networks:
  miranda-manager-network:
    driver: bridge
